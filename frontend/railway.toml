[build]
builder = "dockerfile"
# dockerfilePath is resolved from the repo root, not this file's directory,
# so it must include the frontend/ prefix even though this config lives there.
dockerfilePath = "frontend/Dockerfile"
watchPatterns = ["frontend/**"]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
