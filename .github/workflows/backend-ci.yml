name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          # Cache uv's download/build cache, keyed on the requirements files so
          # a dependency change busts it (audit-ci-05).
          enable-cache: true
          cache-dependency-glob: backend/requirements*.txt

      - name: Install backend deps
        run: |
          uv pip install --system -r backend/requirements-lock.txt
          uv pip install --system -r backend/requirements-dev.txt
          uv pip install --system pre-commit

      - name: Run pre-commit (Python hooks only)
        # ``no-commit-to-branch`` exists to block *local* commits to main;
        # in CI the push is already on main, so the hook is a false positive.
        env:
          SKIP: no-commit-to-branch
        run: |
          pre-commit run --hook-stage pre-commit --files $(git ls-files 'backend')

      - name: Run pre-push hooks (complexity + maintainability + tests)
        # xenon/radon/backend-tests-coverage moved to pre-push locally to keep
        # `git commit` fast. CI still runs them so nothing escapes review.
        env:
          SKIP: no-commit-to-branch
        run: |
          pre-commit run --hook-stage pre-push --files $(git ls-files 'backend')

      - name: Docstring coverage (interrogate)
        working-directory: backend
        run: |
          interrogate -c pyproject.toml src/

      - name: Branch coverage ≥80%
        working-directory: backend
        run: |
          # Verify branch coverage meets the threshold by parsing coverage.xml.
          # Threshold starts at 80% (current baseline ~82%); tighten as test
          # coverage improves, especially in services/botmason.py (70%).
          # Error suppression removed: a pytest crash (collection/import/plugin
          # error) must fail this step, not let the parser read a stale or
          # partial coverage.xml from a prior run.
          pytest --cov=src --cov-report=xml --cov-branch -q --no-header
          python3 -c "
          import os, sys, xml.etree.ElementTree as ET
          if not os.path.exists('coverage.xml'):
              print('::error::coverage.xml not found — pytest produced no report')
              sys.exit(1)
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().attrib['branch-rate']) * 100
          threshold = 80
          print(f'Branch coverage: {rate:.1f}% (threshold: {threshold}%)')
          if rate < threshold:
              print(f'::error::Branch coverage {rate:.1f}% is below {threshold}%')
              sys.exit(1)
          "

      - name: Security (pip-audit)
        run: |
          uv pip install --system pip-audit
          pip-audit -r backend/requirements.txt

  # Cross-version compatibility: verify tests pass on 3.11 and 3.13
  # (3.12 is already covered by the backend-quality job).
  backend-compat:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          # Cache uv's download/build cache, keyed on the requirements files so
          # a dependency change busts it (audit-ci-05).
          enable-cache: true
          cache-dependency-glob: backend/requirements*.txt
          cache-suffix: py${{ matrix.python-version }}

      - name: Install backend deps
        run: |
          uv pip install --system -r backend/requirements.txt
          uv pip install --system -r backend/requirements-dev.txt

      - name: Run tests
        working-directory: backend
        run: pytest -q --no-cov

  migration-drift:
    # BUG-INFRA-023: guard against models diverging from migrations.
    # Runs ``alembic upgrade head`` + ``alembic check`` on a throwaway
    # Postgres; fails if a developer added a model without generating
    # the matching migration, or if the downgrade path is broken
    # (BUG-INFRA-022 regression guard).
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aptitude
          POSTGRES_PASSWORD: aptitude  # pragma: allowlist secret
          POSTGRES_DB: aptitude
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U aptitude"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      # asyncpg requires ``postgresql+asyncpg`` and the alembic env normalises
      # either scheme, so any of the three forms would work here.
      DATABASE_URL: postgresql+asyncpg://aptitude:aptitude@localhost:5432/aptitude  # pragma: allowlist secret
      SECRET_KEY: ci-only-secret-do-not-use-in-prod  # pragma: allowlist secret
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          # Cache uv's download/build cache, keyed on the requirements files so
          # a dependency change busts it (audit-ci-05).
          enable-cache: true
          cache-dependency-glob: backend/requirements*.txt

      - name: Install backend deps
        run: |
          uv pip install --system -r backend/requirements-lock.txt
          uv pip install --system -r backend/requirements-dev.txt

      - name: Upgrade, downgrade, re-upgrade (round-trip, branch 0)
        working-directory: backend
        run: |
          # ``alembic downgrade -1`` is ambiguous when the head is a merge
          # migration (``down_revision`` is a tuple of prior heads), so the
          # branch is resolved explicitly. ``--branch 0`` selects the first
          # parent — for ``c5ed9dd1dabc`` that's the ritual-03 head.
          alembic upgrade head
          prev=$(python -m scripts.resolve_prev_revision alembic.ini --branch 0)
          alembic downgrade "$prev"
          alembic upgrade head

      - name: Downgrade through merge-head branch 1, then re-upgrade
        working-directory: backend
        run: |
          # Same round-trip, but through the *other* parent of the merge
          # head. Without this step, an ``alembic downgrade`` bug along the
          # ritual-04 → soft-delete → chat-spend chain ships undetected.
          # The script exits 2 (and only 2) when branch 1 doesn't exist on
          # the current head; any other non-zero exit is an unexpected
          # failure and must propagate. This distinction is why stderr is
          # NOT swallowed — a real ImportError / file-not-found / decode
          # error here would otherwise be masked.
          alembic upgrade head
          set +e
          prev=$(python -m scripts.resolve_prev_revision alembic.ini --branch 1)
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            alembic downgrade "$prev"
            alembic upgrade head
          elif [ "$rc" -eq 2 ]; then
            echo "Head is not a merge migration; skipping branch-1 round-trip."
          else
            echo "::error::resolve_prev_revision failed with exit code $rc"
            exit "$rc"
          fi

      - name: Detect migration drift (models vs. migrations)
        working-directory: backend
        run: |
          # ``alembic check`` exits non-zero if autogenerate would produce
          # any operations — i.e. if a model was added/modified without a
          # matching migration.
          alembic check

      - name: Postgres advisory-lock regression (issue #274)
        working-directory: backend
        env:
          # Reuses this job's Postgres 16 service — the only CI job with a
          # live Postgres. The live-lock tests in this file skip everywhere
          # the variable is unset (local SQLite-only runs, other CI jobs).
          TEST_POSTGRES_URL: postgresql+asyncpg://aptitude:aptitude@localhost:5432/aptitude  # pragma: allowlist secret
        run: |
          # --no-cov: the repo-wide 90% coverage gate belongs to the
          # backend-quality job; this step only exercises the
          # pg_advisory_xact_lock branch that SQLite cannot.
          python -m pytest tests/test_pg_advisory_lock.py -q --no-cov

  content-drift:
    # Issue #397: the vendored backend/content/ must match its pinned
    # CONTENT_VERSION (no silent drift, no hand edits) and the manifest
    # must satisfy the frozen schema contract. Bootstrap state (nothing
    # vendored yet) passes — the gate arms itself with the first pin.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          # Cache uv's download/build cache, keyed on the requirements files so
          # a dependency change busts it (audit-ci-05).
          enable-cache: true
          cache-dependency-glob: backend/requirements*.txt

      - name: Install drift-check deps
        # The check needs only the sync script's imports, not the app.
        run: uv pip install --system httpx 'jsonschema>=4.0'

      - name: Verify vendored content matches CONTENT_VERSION
        working-directory: backend
        run: python -m scripts.sync_content --check
