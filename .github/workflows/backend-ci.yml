name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0

      - name: Install backend deps
        run: |
          uv pip install --system -r backend/requirements-lock.txt
          uv pip install --system -r backend/requirements-dev.txt
          uv pip install --system pre-commit

      - name: Run pre-commit (Python hooks only)
        # ``no-commit-to-branch`` exists to block *local* commits to main;
        # in CI the push is already on main, so the hook is a false positive.
        env:
          SKIP: no-commit-to-branch
        run: |
          pre-commit run --hook-stage pre-commit --files $(git ls-files 'backend')

      - name: Run pre-push hooks (complexity + maintainability + tests)
        # xenon/radon/backend-tests-coverage moved to pre-push locally to keep
        # `git commit` fast. CI still runs them so nothing escapes review.
        env:
          SKIP: no-commit-to-branch
        run: |
          pre-commit run --hook-stage pre-push --files $(git ls-files 'backend')

      - name: Docstring coverage (interrogate)
        working-directory: backend
        run: |
          interrogate -c pyproject.toml src/

      - name: Branch coverage ≥85%
        working-directory: backend
        run: |
          # The pre-push hook generates coverage data; verify branch coverage
          # meets the threshold by parsing the XML report.
          pytest --cov=src --cov-report=xml --cov-branch -q --no-header 2>/dev/null || true
          python3 -c "
          import sys, xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().attrib['branch-rate']) * 100
          threshold = 85
          print(f'Branch coverage: {rate:.1f}% (threshold: {threshold}%)')
          if rate < threshold:
              print(f'::error::Branch coverage {rate:.1f}% is below {threshold}%')
              sys.exit(1)
          "

      - name: Security (pip-audit)
        run: |
          uv pip install --system pip-audit
          pip-audit -r backend/requirements.txt

  # Cross-version compatibility: verify tests pass on 3.11 and 3.13
  # (3.12 is already covered by the backend-quality job).
  backend-compat:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0

      - name: Install backend deps
        run: |
          uv pip install --system -r backend/requirements.txt
          uv pip install --system -r backend/requirements-dev.txt

      - name: Run tests
        working-directory: backend
        run: pytest -q --no-cov

  migration-drift:
    # BUG-INFRA-023: guard against models diverging from migrations.
    # Runs ``alembic upgrade head`` + ``alembic check`` on a throwaway
    # Postgres; fails if a developer added a model without generating
    # the matching migration, or if the downgrade path is broken
    # (BUG-INFRA-022 regression guard).
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aptitude
          POSTGRES_PASSWORD: aptitude  # pragma: allowlist secret
          POSTGRES_DB: aptitude
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U aptitude"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      # asyncpg requires ``postgresql+asyncpg`` and the alembic env normalises
      # either scheme, so any of the three forms would work here.
      DATABASE_URL: postgresql+asyncpg://aptitude:aptitude@localhost:5432/aptitude  # pragma: allowlist secret
      SECRET_KEY: ci-only-secret-do-not-use-in-prod  # pragma: allowlist secret
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0

      - name: Install backend deps
        run: |
          uv pip install --system -r backend/requirements-lock.txt
          uv pip install --system -r backend/requirements-dev.txt

      - name: Upgrade, downgrade, re-upgrade (round-trip)
        working-directory: backend
        run: |
          alembic upgrade head
          alembic downgrade -1
          alembic upgrade head

      - name: Detect migration drift (models vs. migrations)
        working-directory: backend
        run: |
          # ``alembic check`` exits non-zero if autogenerate would produce
          # any operations — i.e. if a model was added/modified without a
          # matching migration.
          alembic check
