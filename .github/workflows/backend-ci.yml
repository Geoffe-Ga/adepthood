name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4

      - name: Install backend deps
        run: |
          uv pip install --system -r backend/requirements-lock.txt
          uv pip install --system -r backend/requirements-dev.txt
          uv pip install --system pre-commit

      - name: Run pre-commit (Python hooks only)
        run: |
          pre-commit run --hook-stage pre-commit --files $(git ls-files 'backend')

      - name: Run tests
        run: |
          uv pip install --system pytest pytest-cov
          pytest -q

      - name: Security (pip-audit)
        run: |
          uv pip install --system pip-audit
          pip-audit -r backend/requirements.txt
