name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Skip Dependabot PRs: GitHub does not expose Actions secrets (incl.
    # CLAUDE_CODE_OAUTH_TOKEN) to dependabot-triggered runs, so the action would
    # hard-fail before reviewing and block the PR's required check. Dependency
    # bumps merge on green CI + human judgment instead.
    if: github.event.pull_request.user.login != 'dependabot[bot]'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@a92e7c70a4da9793dc164451d829089dc057a464  # v1.0.159
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "dependabot[bot]"
          prompt:  |
            Please review this pull request and provide feedback using the following template:

            ## Summary
            Brief overview (2-3 sentences)

            ## Strengths
            What's done well?

            ## Security Concerns
            Vulnerabilities? 🔴 BLOCKING | 🟡 HIGH | 🟢 LOW

            ## Problems
            Critical issues blocking merge (mark 🔴)
            Consider priority greater than Minor as "Blocking"

            ## Code Quality
            Non-blocking improvements for educational purposes or for future GitHub Issues

            ## CLAUDE.md Adherence
            ✅/❌ Coverage, linting, types, patterns, commits

            ## Testing
            Test quality evaluation
            Insufficient testing is Blocking (mark 🔴)

            ## Documentation
            Docs completeness


            ## Verdict
            ✅ LGTM | 🔄 CHANGES_REQUESTED | 💬 COMMENTS
            **Reasoning:** Specific references

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/sdk#command-line for available options
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'

      - name: Enforce LGTM verdict
        # The review step above posts a ``## Verdict: <LGTM|CHANGES_REQUESTED|
        # COMMENTS>`` comment but never fails the job, so a non-LGTM verdict used
        # to merge silently. Read the latest verdict and fail the check unless it
        # is LGTM, so this required check actually gates the merge. Fail-closed if
        # no verdict is found (a missing review must not pass).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          verdict=""
          for attempt in $(seq 1 10); do
            body=$(gh pr view "$PR_NUMBER" -R "$REPO" --json comments \
              --jq '[.comments[] | select(.body | test("(?i)##\\s*verdict"))] | last.body // ""')
            if [ -n "$body" ]; then
              # Grab the heading + the 3 lines after it (handles both the inline
              # "## Verdict: X" and the two-line "## Verdict\n<emoji> X" formats),
              # then take the first verdict token in that window.
              verdict=$(printf '%s\n' "$body" \
                | grep -iA3 '##[[:space:]]*verdict' \
                | grep -ioE 'CHANGES[ _]REQUESTED|LGTM|COMMENTS' \
                | head -1 || true)
            fi
            [ -n "$verdict" ] && break
            echo "Awaiting the review verdict comment (attempt ${attempt}/10)…"
            sleep 12
          done
          normalized=$(printf '%s' "$verdict" | tr '[:lower:] ' '[:upper:]_')
          if [ -z "$normalized" ]; then
            echo "::error::No Claude review verdict found — failing closed."
            exit 1
          fi
          echo "Review verdict: ${normalized}"
          if [ "$normalized" = "LGTM" ]; then
            echo "✅ LGTM — gate passes."
          else
            echo "::error::Review verdict is '${normalized}' (not LGTM) — blocking merge until addressed."
            exit 1
          fi
