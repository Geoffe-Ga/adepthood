[build]
builder = "dockerfile"
# dockerfilePath is resolved from the repo root, not this file's directory,
# so it must include the backend/ prefix even though this config lives there.
dockerfilePath = "backend/Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
